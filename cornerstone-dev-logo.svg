<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" role="img" aria-labelledby="title desc">
  <title id="title">Cornerstone Dev LLC</title>
  <desc id="desc">Cornerstone Dev LLC logo — a geometric corner mark paired with a two-line wordmark.</desc>

  <!-- Corner mark -->
  <path d="M 0 0 L 60 0 L 60 20 L 20 20 L 20 60 L 0 60 Z" fill="currentColor"/>

  <!-- Wordmark -->
  <text x="80" y="28" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="500" fill="currentColor" letter-spacing="0.01em">Cornerstone</text>
  <text x="80" y="60" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="500" fill="currentColor" fill-opacity="0.55" letter-spacing="0.01em">Dev LLC</text>
</svg>
